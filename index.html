<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAYASH ELITE WORLD | Official Store</title>
    <style>
        body { margin: 0; background-color: #000; color: #fff; font-family: 'Segoe UI', sans-serif; }
        header { background: #111; padding: 15px; text-align: center; border-bottom: 2px solid gold; }
        .logo { font-size: 28px; font-weight: bold; color: gold; letter-spacing: 3px; }
        
        /* Premium Product Display */
        .product-card { background: linear-gradient(145deg, #1a1a1a, #000); margin: 20px; border-radius: 15px; padding: 20px; text-align: center; border: 1px solid #333; }
        .product-img { width: 100%; max-width: 300px; height: 350px; object-fit: cover; border-radius: 10px; margin-bottom: 15px; border: 1px solid gold; }
        
        .buy-btn { background: gold; color: #000; border: none; padding: 10px 30px; font-weight: bold; border-radius: 5px; cursor: pointer; }
        
        /* Floating Help Desk */
        .mayra-ai { position: fixed; bottom: 20px; right: 20px; background: #222; border: 1px solid gold; padding: 10px; border-radius: 10px; font-size: 14px; }
    </style>
</head>
<body>

<header>
    <div class="logo">JAYASH ELITE WORLD</div>
</header>

<div class="product-card">
    <img src="https://images.unsplash.com/photo-1632661674596-df8be070a5c5?auto=format&fit=crop&q=80&w=300" class="product-img" alt="iPhone 15 Pro">
    <h3>IPHONE 15 PRO - ELITE EDITION</h3>
    <p style="color: gold;">$999.00</p>
    <button class="buy-btn">BUY NOW (USA DELIVERY)</button>
</div>

<div class="product-card">
    <img src="https://images.unsplash.com/photo-1617137984095-74e4e5e3613f?auto=format&fit=crop&q=80&w=300" class="product-img" alt="Luxury Suit">
    <h3>ROYAL FASHION COLLECTION</h3>
    <p style="color: gold;">$450.00</p>
    <button class="buy-btn">BUY NOW</button>
</div>

<div class="mayra-ai">ℹ️ Mayra Help Desk Active</div>

</body>
</html>
