<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAYASH ELITE WORLD | Premium Shopping</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Model Viewer -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.3.0/model-viewer.min.js"></script>

    <style>
        :root {
            --gold-primary: #d4af37;
            --gold-light: #f3e5ab;
            --white-off: #fdfdfd;
            --text-dark: #1a1a1a;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--white-off);
            color: var(--text-dark);
            overflow-x: hidden;
        }

        .font-elite {
            font-family: 'Playfair Display', serif;
        }

        /* Gold Gradient Text & Borders */
        .text-gold {
            background: linear-gradient(45deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200% auto;
            animation: shine 5s linear infinite;
        }

        .bg-gold-gradient {
            background: linear-gradient(135deg, #d4af37 0%, #f3e5ab 50%, #d4af37 100%);
        }

        .border-gold {
            border: 1px solid #d4af37;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        /* Smooth Scroll */
        html {
            scroll-behavior: smooth;
            scroll-padding-top: 80px;
        }

        /* 3D Model Customization */
        model-viewer {
            width: 100%;
            height: 400px;
            background-color: transparent;
            --poster-color: transparent;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1; 
        }
        ::-webkit-scrollbar-thumb {
            background: #d4af37; 
            border-radius: 4px;
        }

        /* Bottom Nav Mobile */
        .mobile-nav {
            display: flex;
            justify-content: space-around;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid #eee;
            padding: 10px 0;
            position: fixed;
            bottom: 0;
            width: 100%;
            z-index: 1000;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.05);
        }
        
        .nav-item {
            text-align: center;
            font-size: 0.75rem;
            color: #666;
            cursor: pointer;
            transition: 0.3s;
        }
        
        .nav-item.active {
            color: #d4af37;
        }

        .nav-icon {
            font-size: 1.2rem;
            margin-bottom: 2px;
        }

        /* AI Loader */
        .ai-loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #d4af37;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            display: none;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>

    <header
